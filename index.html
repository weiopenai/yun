<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>給 昀 的</title>
<style>
 @import url('https://fonts.googleapis.com/css2?family=Iansui&family=Noto+Serif+TC:wght@200;300&family=Playfair+Display:ital@1&display=swap');
 *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
 html, body { width: 100%; height: 100%; overflow: hidden; }
 body { background: #aed4ea; display: flex; align-items: center; justify-content: center; font-family: 'Iansui', 'Noto Serif TC', serif; }
 .bg { position: fixed; inset: 0; background: radial-gradient(ellipse 80% 50% at 50% 0%, rgba(255,255,255,0.45) 0%, transparent 60%), radial-gradient(ellipse 60% 40% at 20% 80%, rgba(178,215,240,0.3) 0%, transparent 55%), radial-gradient(ellipse 50% 50% at 80% 60%, rgba(140,195,225,0.2) 0%, transparent 50%), linear-gradient(175deg, #c8e6f5 0%, #aed4ea 40%, #91c4e0 100%); z-index: 0; }
 .cloud-glow { position: fixed; border-radius: 50%; background: rgba(255,255,255,0.12); filter: blur(60px); z-index: 0; }
 .glow-1 { width: 350px; height: 220px; top: 3%; left: -8%; }
 .glow-2 { width: 280px; height: 200px; bottom: 10%; right: -5%; }
 .sun { position: fixed; top: -8%; right: 12%; width: 180px; height: 180px; border-radius: 50%; background: radial-gradient(circle, rgba(255,248,230,0.7) 0%, rgba(255,240,200,0.4) 25%, rgba(255,225,170,0.15) 50%, transparent 70%); z-index: 0; opacity: 0; animation: sunAppear 4s ease forwards 0.5s; }
 .sun-halo { position: fixed; top: -18%; right: 2%; width: 340px; height: 340px; border-radius: 50%; background: radial-gradient(circle, rgba(255,245,220,0.25) 0%, rgba(255,235,195,0.1) 40%, transparent 65%); filter: blur(20px); z-index: 0; opacity: 0; animation: sunAppear 5s ease forwards 0.3s; }
 .sun-rays { position: fixed; top: -12%; right: 5%; width: 260px; height: 260px; border-radius: 50%; background: radial-gradient(circle, rgba(255,250,235,0.18) 0%, rgba(255,242,210,0.06) 50%, transparent 70%); filter: blur(30px); z-index: 0; opacity: 0; animation: sunAppear 6s ease forwards 1s, sunPulse 8s ease-in-out infinite 4s; }
 @keyframes sunAppear { from { opacity: 0; } to { opacity: 1; } }
 @keyframes sunPulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.08); opacity: 0.85; } 100% { transform: scale(1); opacity: 1; } }
 .cloud { position: fixed; z-index: 0; opacity: 0; animation: cloudFadeIn 2.5s ease forwards, cloudDrift 50s ease-in-out infinite; }
 .cloud .puff { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.92); box-shadow: inset 0 -8px 16px rgba(160,200,230,0.25), 0 4px 12px rgba(160,200,230,0.15); }
 .cloud .puff.shadow { background: rgba(210,230,245,0.6); box-shadow: none; }
 .cloud .puff.highlight { background: rgba(255,255,255,0.98); box-shadow: inset 0 4px 8px rgba(255,255,255,1), inset 0 -6px 14px rgba(170,210,235,0.2); }
 .cloud-1 { top: 3%; left: 2%; width: 180px; height: 95px; } .cloud-1 .p1 { width: 75px; height: 60px; bottom: 12px; left: 8px; border-radius: 52% 48% 45% 50%; } .cloud-1 .p2.highlight { width: 70px; height: 68px; bottom: 18px; left: 42px; border-radius: 48% 52% 42% 50%; } .cloud-1 .p3 { width: 58px; height: 55px; bottom: 20px; left: 82px; border-radius: 50% 46% 48% 44%; } .cloud-1 .p4 { width: 42px; height: 38px; bottom: 14px; left: 120px; border-radius: 46% 50% 44% 48%; } .cloud-1 .p5.shadow { width: 160px; height: 28px; bottom: 0; left: 5px; border-radius: 40% 45% 50% 42%; } .cloud-1 .p6 { width: 35px; height: 30px; bottom: 28px; left: 28px; border-radius: 50% 44% 48% 46%; }
 .container { position: relative; z-index: 1; text-align: center; padding: 3rem 2rem; max-width: 400px; width: 90%; }
 .line { opacity: 0; transform: translateY(14px); animation: fadeUp 1.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
 .line-thai { font-size: 0.95rem; color: rgba(255,255,255,0.65); margin-bottom: 1.6rem; animation-delay: 0.2s; }
 .line-1 { font-size: 1.18rem; color: #fff; margin-bottom: 0.5rem; animation-delay: 0.6s; }
 .line-2 { font-family: 'Playfair Display', serif; font-style: italic; font-size: 0.9rem; color: rgba(255,255,255,0.55); margin-bottom: 2.6rem; animation-delay: 1s; }
 .line-3 { font-size: 1.15rem; color: #1a3d52; line-height: 2.5; animation-delay: 1.8s; }
 .line-4 { font-size: 1.15rem; color: #1a3d52; line-height: 2.5; animation-delay: 2.9s; }
 .line-5 { font-size: 1.15rem; color: #1a3d52; line-height: 2.5; animation-delay: 4s; }
 .ig-handle { font-size: 1.3rem; color: #fff; text-shadow: 0 2px 16px rgba(80,140,180,0.35); }
 @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
 @keyframes cloudFadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
 @keyframes cloudDrift { 0% { transform: translateX(0); } 100% { transform: translateX(0); } }
</style>
</head>
<body>
<div class="bg"></div>
<div class="container">
 <p class="line line-thai">ขอโทษที่ทำให้เธอเสียใจ</p>
 <p class="line line-1">給 昀 的</p>
 <p class="line line-2">something I should have said</p>
 <p class="line line-3">之前的事，是我不好。</p>
 <p class="line line-4">有機會可以的話，</p>
 <p class="line line-5">也許，可以重新認識。</p>
 <div class="ig-block"><p class="ig-label">Instagram</p><p class="ig-handle">mike.yaowei</p></div>
</div>
</body>
</html>
